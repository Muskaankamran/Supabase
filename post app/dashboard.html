<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/dashboard.css">
    <title> Dashboard</title>
</head>

<body>
    <div class="container-fluid p-0">
        <nav class="navbar custom-navbar">

            <div class="container-fluid d-flex align-items-center">

                <!-- Logo -->
                <a class="navbar-brand" href="#">Navbar</a>

                <!-- Right Side -->
                <div class="d-flex align-items-center ms-auto">

                    <input id="searchValue" class="form-control search-input" type="search" placeholder="Search" />

                    <button onclick="searchPosts()" class="btn btn-search">
                        Search
                    </button>

                    <button class="btn btn-danger ms-2" onclick="logout()">
                        Logout
                    </button>

                </div>
            </div>

        </nav>
    </div>
    <div class="row">
        <div class="col-4">
            <div class="card p-2 m-4">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" aria-describedby="emailHelp" />
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="discription" rows="3"></textarea>
                </div>
                <div class="d-flex justify-content-around mb-2">
                    <img onclick="selectImg('./images/bg1.jpg', event)" class="bgImg" src="/images/bg1.jpg">
                    <img onclick="selectImg('./images/bg2.avif', event)" class="bgImg" src="./images/bg2.avif">
                    <img onclick="selectImg('./images/bg3.jpg', event)" class="bgImg" src="./images/bg3.jpg">
                    <img onclick="selectImg('./images/bg4.avif', event)" class="bgImg" src="./images/bg4.avif">
                    <img onclick="selectImg('./images/bg5.avif', event)" class="bgImg" src="./images/bg5.avif">
                </div>
                <div class="ms-auto">
                    <button onclick="post()" type="submit" class="btn myBtn">
                        Post
                    </button>
                </div>
            </div>
        </div>
        <div class="col-8">
            <div id="posts"></div>
        </div>
    </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/dashboard.js"></script>
</body>

</html>
