<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login / Signup Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="content">
    <div class="container">
      <div class="nav">
        <button class="btn btn1" id="btns1" onclick="showLogin()">Login</button>
        <button class="btn btn2" id="btns2" onclick="showSignup()">Sign Up</button>
      </div>
      <div class="main">
        <div id="login" class="loginClass">
          <input type="email" id="loginEmail" placeholder="Email" required><br>
          <input type="password" id="loginPassword" placeholder="Password" required><br>
          <div class="enquire">
            <a href="#"><input type="checkbox" id="remember">Remember me</a>
            <a href="#">Forgot password?</a>
          </div><br>
          <button class="subBtn" onclick="login(event)">LOGIN</button><br>
          <a href="#" onclick="showSignup()">No Account? Create one</a>
        </div>

        <div id="signUp" class="signupClass">
          <input type="email" id="signupEmail" placeholder="Email" required><br>
          <input type="text" id="signupUsername" placeholder="Username" required><br>
          <input type="password" id="signupPassword" placeholder="Password" required><br>
          <button class="signBtn" onclick="signup(event)">CREATE ACCOUNT</button>
        </div>
      </div>
    </div><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
