<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="CSS/admin.css" />
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <ul>
        <li onclick="showDashboard()">Dashboard</li>
        <li onclick="showPosts()">Manage Posts</li>
        <li onclick="loadUsers()">Manage Users</li>
        <li onclick="logout()">Logout</li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
      <h1 class="page-title">Dashboard</h1>

      <!-- Dashboard Stats -->
      <div class="cards">
        <div class="card">
          <h3>Total Users</h3>
          <p id="totalUsers">0</p>
        </div>

        <div class="card">
          <h3>Total Posts</h3>
          <p id="totalPosts">0</p>
        </div>
      </div>

      <!-- Dynamic Content -->
      <div id="mainContent">
        <h2>Posts</h2>
        <div id="posts"></div>
      </div>
    </div>

  </div>

  <script type="module" src="JS/admin.js"></script>
</body>
</html>
